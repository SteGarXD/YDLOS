# Nginx for the standalone container "ydl-os-nginx" (docker-compose.production.yaml).
# Proxies HTTP to the DataLens UI container (service name: ui, port 8080).
# TLS и сертификаты — только на внешнем nginx (сисадмин); до этого контейнера идёт обычный HTTP.
# X-Forwarded-Proto с внешнего прокси пробрасывается в приложение (OIDC/редиректы).
# Do NOT mount this file into the ui container — ui uses nginx/nginx.conf.

worker_processes auto;
error_log /proc/self/fd/1 warn;
pid /tmp/nginx.pid;

events {
    # ≤1024 по умолчанию в контейнере (ulimit); иначе warn в логах nginx
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 200m;
    proxy_buffer_size 32k;
    proxy_buffers 8 32k;
    large_client_header_buffers 16 5120k;

    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location / {
            proxy_pass http://ui:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 360s;
            proxy_send_timeout 360s;
            proxy_read_timeout 360s;
        }
    }
}
