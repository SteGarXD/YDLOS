# Edge proxy в режиме dev-ui: HTTP :8080 в контейнере → host npm run dev (DEV_CLIENT_PORT, по умолчанию 8080).
# TLS — на внешнем nginx сисадмина. Не монтировать в контейнер ui.

worker_processes auto;
error_log /proc/self/fd/1 warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 200m;
    proxy_buffer_size 32k;
    proxy_buffers 8 32k;
    large_client_header_buffers 16 5120k;

    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;
        listen [::]:8080;
        server_name _;

        location = /favicon.ico {
            alias /opt/ydl-os-assets/favicorn.64x64.svg;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /favicorn.64x64.svg {
            alias /opt/ydl-os-assets/favicorn.64x64.svg;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /favicorn.48x48.svg {
            alias /opt/ydl-os-assets/favicorn.48x48.svg;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /logo-aeronavigator.png {
            alias /opt/ydl-os-assets/logo-aeronavigator.png;
            add_header Cache-Control "public, max-age=3600";
        }

        location / {
            proxy_pass http://host.docker.internal:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 360s;
            proxy_send_timeout 360s;
            proxy_read_timeout 360s;
        }
    }
}
